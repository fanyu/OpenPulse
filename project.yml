name: OpenPulse
options:
  bundleIdPrefix: com.fanyu
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "33M7V22L6Y"  # Replace with your own Apple Developer Team ID to build
    PRODUCT_NAME: "$(TARGET_NAME)"
  configs:
    Debug:
      COPY_PHASE_STRIP: NO
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_OPTIMIZATION_LEVEL: 0
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  OpenPulse:
    build:
      targets:
        OpenPulse: all
    run:
      config: Debug
      executable: OpenPulse
    test:
      config: Debug
      targets:
        - OpenPulseTests
    management:
      shared: true

  OpenPulseTests:
    build:
      targets:
        OpenPulse: [run]
        OpenPulseTests: [test]
    test:
      config: Debug
      targets:
        - OpenPulseTests
    management:
      shared: true

  OpenPulseiPhone:
    build:
      targets:
        OpenPulseiPhone: all
    run:
      config: Debug
      executable: OpenPulseiPhone
    test:
      config: Debug
      targets:
        - OpenPulseiPhoneTests
    management:
      shared: true

  OpenPulseiPhoneTests:
    build:
      targets:
        OpenPulseiPhone: [run]
        OpenPulseiPhoneTests: [test]
    test:
      config: Debug
      targets:
        - OpenPulseiPhoneTests
    management:
      shared: true

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.3"
  SwiftZSTD:
    url: https://github.com/aperedera/SwiftZSTD
    branch: master

targets:
  OpenPulse:
    type: application
    platform: macOS
    sources:
      - OpenPulse
    resources:
      - path: OpenPulse/Resources
        optional: true
    info:
      path: OpenPulse/Info.plist
      properties:
        CFBundleName: OpenPulse
        CFBundleDisplayName: OpenPulse
        CFBundleIdentifier: com.fanyu.openpulse
        CFBundleVersion: "13"
        CFBundleShortVersionString: "1.0.12"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSUserNotificationAlertStyle: alert
    entitlements:
      path: OpenPulse/OpenPulse.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.fanyu.openpulse
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.fanyu.openpulse
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.fanyu.openpulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.openpulse
        INFOPLIST_FILE: OpenPulse/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenPulse/OpenPulse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SDKROOT: macosx
        SUPPORTED_PLATFORMS: macosx
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: SQLite.swift
        product: SQLite
      - package: SwiftZSTD
        product: SwiftZSTD

  OpenPulseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OpenPulseTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SDKROOT: macosx
        SUPPORTED_PLATFORMS: macosx
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenPulse.app/Contents/MacOS/OpenPulse"
    dependencies:
      - target: OpenPulse

  OpenPulseiPhone:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenPulse/Shared
      - path: OpenPulse/Models/Tool.swift
      - path: OpenPulseiPhone/App
      - path: OpenPulseiPhone/Data
      - path: OpenPulseiPhone/Models
      - path: OpenPulseiPhone/Views
    resources:
      - path: OpenPulse/Resources/Assets.xcassets
    info:
      path: OpenPulseiPhone/Info.plist
      properties:
        CFBundleName: OpenPulse iPhone
        CFBundleDisplayName: OpenPulse
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: OpenPulseiPhone/OpenPulseiPhone.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.fanyu.openpulse
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.fanyu.openpulse
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-iPhone
        TARGETED_DEVICE_FAMILY: "1"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"

  OpenPulseiPhoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenPulseiPhoneTests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenPulseiPhone.app/OpenPulseiPhone"
    dependencies:
      - target: OpenPulseiPhone
