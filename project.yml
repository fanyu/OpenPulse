name: OpenPulse
options:
  bundleIdPrefix: com.fanyu
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "33M7V22L6Y"  # Replace with your own Apple Developer Team ID to build

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.3"
  SwiftZSTD:
    url: https://github.com/aperedera/SwiftZSTD
    branch: master

targets:
  OpenPulse:
    type: application
    platform: macOS
    sources:
      - OpenPulse
    resources:
      - path: OpenPulse/Resources
        optional: true
    info:
      path: OpenPulse/Info.plist
      properties:
        CFBundleName: OpenPulse
        CFBundleDisplayName: OpenPulse
        CFBundleIdentifier: com.fanyu.openpulse
        CFBundleVersion: "13"
        CFBundleShortVersionString: "1.0.12"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSUserNotificationAlertStyle: alert
    entitlements:
      path: OpenPulse/OpenPulse.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.fanyu.openpulse
        com.apple.developer.icloud-services:
          - CloudKit
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.fanyu.openpulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.openpulse
        INFOPLIST_FILE: OpenPulse/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenPulse/OpenPulse.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SQLite.swift
        product: SQLite
      - package: SwiftZSTD
        product: SwiftZSTD

  OpenPulseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OpenPulseTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: OpenPulse

  OpenPulseiPhone:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenPulse/Shared
      - path: OpenPulse/Models/Tool.swift
      - path: OpenPulseiPhone/App
      - path: OpenPulseiPhone/Data
      - path: OpenPulseiPhone/Models
      - path: OpenPulseiPhone/Views
    info:
      path: OpenPulseiPhone/Info.plist
      properties:
        CFBundleName: OpenPulse iPhone
        CFBundleDisplayName: OpenPulse
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: OpenPulseiPhone/OpenPulseiPhone.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.fanyu.openpulse
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"

  OpenPulseiPhoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenPulseiPhoneTests
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: OpenPulseiPhone
